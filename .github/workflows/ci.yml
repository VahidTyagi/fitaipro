name: CI — FitAI Pro Pre-Deploy Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  playwright-tests:
    name: 🧪 Pre-Deploy Automation Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🌐 Install Playwright
        run: npx playwright install chromium --with-deps

      - name: 🧪 Run Tests T01-T12
        id: tests
        run: |
          npx playwright test tests/e2e \
            --grep "T0[1-9]|T1[0-2]" \
            --reporter=list
        env:
          PLAYWRIGHT_TEST_BASE_URL: https://fitaipro-five.vercel.app

      - name: 🚫 Deploy blocked — notify
        if: failure()
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════"
          echo "  🚫 DEPLOYMENT BLOCKED — TESTS FAILED"
          echo "═══════════════════════════════════════════════════════"
          echo "  Code cannot go to production until all tests pass."
          echo ""
          echo "  📋 What to do:"
          echo "     1. Look at the failed test above"
          echo "     2. Fix the code issue"
          echo "     3. npx playwright test tests/e2e (run locally)"
          echo "     4. All 12 must pass → then push"
          echo ""
          echo "  📧 Contact: fitaipro.official@gmail.com"
          echo "═══════════════════════════════════════════════════════"
          exit 1

      - name: 📊 Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14

      - name: ✅ Deploy approved
        if: success()
        run: |
          echo "✅ 12/12 tests passed — Vercel will deploy"